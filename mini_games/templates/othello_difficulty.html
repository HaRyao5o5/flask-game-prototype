<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>難易度選択 - オセロ</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<h1>オセロ</h1>

<div class="rule-box">
    <p class="rule-title">遊び方</p>
    <ul class="rule-list">
        <li>自分の石で相手の石を挟めるマスに置くと、挟んだ石が自分の色にひっくり返る</li>
        <li>置ける場所がなければ自動的にパス</li>
        <li>両者とも置ける場所がなくなったら終了、石数が多い方が勝ち</li>
        <li>盤面の四隅は一度取られるとひっくり返せないので、特に重要なマス</li>
    </ul>
</div>

<p class="rule-text">難易度を選んでね</p>

<form method="POST" action="{{ url_for('othello_start') }}" class="difficulty-form">
    <button type="submit" name="difficulty" value="easy" class="difficulty-btn easy">
        <span class="difficulty-label">EASY</span>
        <span class="difficulty-desc">ランダムに手を選ぶ</span>
    </button>
    <button type="submit" name="difficulty" value="normal" class="difficulty-btn normal">
        <span class="difficulty-label">NORMAL</span>
        <span class="difficulty-desc">角を狙い、危険手を避ける</span>
    </button>
</form>

<a href="{{ url_for('index') }}" class="reset-link">トップへ戻る</a>

</body>
</html>
