<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>難易度選択 - 数字当てゲーム</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<h1>数字当てゲーム</h1>

<div class="rule-box">
    <p class="rule-title">遊び方</p>
    <ul class="rule-list">
        <li>あなたとCPU、お互いに重複しない3桁の秘密の数字を持っている</li>
        <li>あなたはCPUの数字を、CPUはあなたの数字を、同時に推理し合う</li>
        <li>桁も数字も合っていれば EAT、数字だけ合っていれば BITE</li>
        <li>先に3EAT(完全一致)を出した方が勝ち</li>
    </ul>
</div>

<p class="rule-text">難易度を選んでね</p>

<form method="POST" action="{{ url_for('numeron_start') }}" class="difficulty-form">
    <button type="submit" name="difficulty" value="easy" class="difficulty-btn easy">
        <span class="difficulty-label">EASY</span>
        <span class="difficulty-desc">毎回ランダムに予想する</span>
    </button>
    <button type="submit" name="difficulty" value="normal" class="difficulty-btn normal">
        <span class="difficulty-label">NORMAL</span>
        <span class="difficulty-desc">過去の結果から絞り込む</span>
    </button>
</form>

<a href="{{ url_for('index') }}" class="reset-link">トップへ戻る</a>

</body>
</html>
