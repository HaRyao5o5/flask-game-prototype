<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>ミニゲーム集</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<h1>ミニゲーム集</h1>

<p class="score-text">所持チップ: {{ chips }} 枚</p>

<p class="rule-text">遊びたいゲームを選んでね</p>

<div class="game-list">
    <a href="{{ url_for('tictactoe') }}" class="game-card">
        <span class="game-card-icon">⭕</span>
        <span class="game-card-title">○×ゲーム</span>
        <span class="game-card-desc">シンプルな三目並べ</span>
    </a>

    <a href="{{ url_for('numeron') }}" class="game-card">
        <span class="game-card-icon">🔢</span>
        <span class="game-card-title">数字当てゲーム</span>
        <span class="game-card-desc">3桁の数字を推理せよ</span>
    </a>

    <a href="{{ url_for('othello') }}" class="game-card">
        <span class="game-card-icon">⚫</span>
        <span class="game-card-title">オセロ</span>
        <span class="game-card-desc">石を挟んでひっくり返せ</span>
    </a>

    <a href="{{ url_for('concentration') }}" class="game-card">
        <span class="game-card-icon">🃏</span>
        <span class="game-card-title">神経衰弱</span>
        <span class="game-card-desc">同じ絵柄のペアを探せ</span>
    </a>

    <a href="{{ url_for('blackjack') }}" class="game-card">
        <span class="game-card-icon">🃏</span>
        <span class="game-card-title">ブラックジャック</span>
        <span class="game-card-desc">21を狙ってディーラーに勝て</span>
    </a>

    <a href="{{ url_for('slot') }}" class="game-card">
        <span class="game-card-icon">🎰</span>
        <span class="game-card-title">スロット</span>
        <span class="game-card-desc">絵柄を揃えて一攫千金</span>
    </a>

    <a href="{{ url_for('chohan') }}" class="game-card">
        <span class="game-card-icon">🎲</span>
        <span class="game-card-title">丁半博打</span>
        <span class="game-card-desc">丁か半か、運命の一振り</span>
    </a>

    <a href="{{ url_for('roulette') }}" class="game-card">
        <span class="game-card-icon">🎡</span>
        <span class="game-card-title">ルーレット</span>
        <span class="game-card-desc">数字・色・偶奇で賭ける</span>
    </a>

    <a href="{{ url_for('poker') }}" class="game-card">
        <span class="game-card-icon">♠️</span>
        <span class="game-card-title">ポーカー</span>
        <span class="game-card-desc">役を作って高配当を狙え</span>
    </a>
</div>

</body>
</html>
